# Copie para ~/.config/wmonit/config.toml e preencha.
# Tokens também podem vir de variáveis de ambiente (têm precedência):
#   WMONIT_GITLAB_URL, WMONIT_GITLAB_TOKEN
#   WMONIT_JIRA_URL, WMONIT_JIRA_TOKEN, WMONIT_JIRA_EMAIL

[gitlab]
url = "https://gitlab.nelogica.com.br" # ajuste para a URL real do GitLab da Nelogica
token = ""                             # Personal Access Token com scope read_api

[jira]
url = "https://jira.nelogica.com.br" # ajuste para a URL real do Jira
auth = "bearer"                      # "bearer" para Jira Server/DC (PAT) · "basic" para Jira Cloud
email = ""                           # só necessário com auth = "basic"
token = ""                           # PAT (Server/DC) ou API token (Cloud)

# Ordem em que os grupos de status aparecem na aba Jira (use os nomes
# exatos dos status do seu projeto; comparação ignora maiúsculas).
status_order = [
  "Análise em Progresso",
  "Em Andamento",
  "Revisão 1",
  "Em Deploy",
]

# Id do campo de complexidade da issue, usado na aba Desempenho
# (ex.: "customfield_10106"). Vazio = detecção automática pelo nome
# (procura um campo cujo nome contenha "complex").
complexity_field = ""

# Metas semanais opcionais — viram barras de progresso na aba Desempenho.
# Deixe 0 (ou omita a seção) para não exibir.
[goals]
weekly_mrs = 0
weekly_issues = 0

# Sessões de trabalho com o Claude Code (aba Sessões, tecla 'c').
[claude]
sources_dir = "c:/Fontes"  # pasta com os serviços (cada subpasta é um repo git)
worktrees_dir = ""         # vazio = <sources_dir>/.worktrees
bin = "claude"             # binário do Claude Code
branch_prefix = ""         # prefixo da branch de sessões de issue (ex.: "feature/"); vazio = só a chave (ABC-123)
# Modo de permissão das execuções headless (--permission-mode). Em modo
# headless ninguém aprova ferramenta, então o default é "bypassPermissions"
# (o worktree é isolado, mas o agente ganha bash livre). "acceptEdits" ou
# "default" são mais seguros, porém build/commit podem ser negados.
permission_mode = "bypassPermissions"

# Instruções extras por serviço, anexadas ao prompt de cada sessão.
# [claude.templates]
# hades = "O roteamento fica em src/router; siga o padrão dos handlers existentes."
